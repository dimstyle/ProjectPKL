openapi: 3.0.3

info:
  title: API Users Management
  version: 1.0.0

paths:
  /api/auth/registration:
    post:
      summary: Create user data

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref : "#/components/schemas/RegistrationRequest"


      responses:
        "201" :
          description: Created
          content:
            application/json:
              schema:
                $ref : "#/components/schemas/DefaultResponse"

  /api/auth/login:
    post:
      summary: User login

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref : "#/components/schemas/RegistrationRequest"
        
      responses:
        "200" :
          description: Success
          content:
            application/json:
                schema:
                  $ref : "#/components/schemas/DefaultResponse"

  /api/users/profiles:
    get:
      summary: List Users

      responses:
        "200":
          description: Success
          content:
            application/json:

              schema:
                items:
                  $ref : "#/components/schemas/ListUsersResponse"
              
      
  /api/users/{id}:
    get:
      summary: Fetch user data by id
      parameters:
        - name: id
          in: path
          required: true
          description: user id 
          schema:
            type: integer
          
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfoResponse"
  
  /api/users/posts:
    get:
      summary: Fetch user data with jwt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListPostsRequest"

      responses:
        "200":
          description: success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPostsResponse"
  
  /api/user/createpost:
    post: 
      summary: make user's post 
      requestBody:
        required: true
        content:
          application/json:
            schema:  
              $ref: "#/components/schemas/CreatePostRequest"
        
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefaultResponse"

         
components:

  schemas:

    DefaultResponse:
      type: object
      properties:
        message: 
          type : string

    RegistrationRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password: 
          type: string

    LoginRequest:
      type: object
      properties:
        email: 
          type : string
        passsword:
          type: string


    GetUserResponse:
      type: object
      properties:
        id:
          type: integer
        email: 
          type: string
        username:
          type: string
      
    UserInfoResponse:
      type: object
      properties:
        id:
          type: integer
        email: 
          type: string
        username:
          type: string
    
    ListUsersResponse:
      type: object
      properties:
        message: 
          type: string
        users:
          type: array
          items:
            $ref : "#/components/schemas/GetUserResponse"
    
    ListPostsRequest:
      type: object
      properties:
        range:
          type: string

    PostsResponse:
      type: object
      properties:
        user_id:
          type: integer
        content:
          type: string
        title:
          type: string
        username:
          type: string

    ListPostsResponse:
      type: object
      properties:
        message:
          type: string
        posts:
          type: array
          items:
            $ref: "#/components/schemas/PostsResponse"
    
    CreatePostRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        user_id:
          type: integer
        



        


