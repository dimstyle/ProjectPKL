version: "2"

sql:
  - engine: "postgresql"
    schema: "sql/schema.sql"
    queries: "sql/queries"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"

        overrides:
          # timestamp -> Go time.Time
          - db_type: "timestamp"
            go_type: "time.Time"

          # timestamptz -> Go time.Time (IMPORTANT)
          - db_type: "timestamptz"
            go_type: "time.Time"
          
          - db_type: "pg_catalog.timestamp"
            go_type: "time.Time"

          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"